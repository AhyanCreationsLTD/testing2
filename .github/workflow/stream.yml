name: 🚀 Auto Live Streaming Node

on:
  # ১. সুপাবেস/অ্যাডমিন প্যানেল থেকে অটোমেটিক এপিআই ট্রিগার
  repository_dispatch:
    types: [trigger-stream]
    
  # ২. গিটহাব ড্যাশবোর্ড থেকে টেস্ট করার ম্যানুয়াল অপশন
  workflow_dispatch:
    inputs:
      video_url:
        description: 'লাইভ ভিডিওর ডিরেক্ট URL'
        required: true
      rtmp_destination:
        description: 'RTMP Server URL + Stream Key'
        required: true

jobs:
  live_stream:
    runs-on: ubuntu-latest

    steps:
    # ১. গিটহাব থেকে কোড রানারে ক্লোন করা
    - name: 📁 Checkout Repository Files
      uses: actions/checkout@v3

    # ২. লিনাক্স এনভায়রনমেন্ট ও এফএফএমপেক ডিপেন্ডেন্সি রেডি করা
    - name: 🌐 Preparing System Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg curl python3

    # ৩. পাইথন কোডটি ব্যাকগ্রাউন্ডে এক্সিকিউট করা
    - name: 🎥 Executing Live Stream Core Engine
      env:
        VIDEO_URL: ${{ github.event.client_payload.video_url || github.event.inputs.video_url }}
        RTMP_TARGET: ${{ github.event.client_payload.rtmp_destination || github.event.inputs.rtmp_destination }}
      run: |
        python3 stream_engine.py
